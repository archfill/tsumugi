[tools]
node = "22"
pnpm = "11.6.0"

[tasks.install]
description = "Install all workspace dependencies"
run = "pnpm install"

[tasks.dev-server]
description = "Run MCP server in dev mode"
run = "pnpm dev:server"

[tasks.dev-ui]
description = "Run admin UI in dev mode"
run = "pnpm dev:ui"

[tasks.build]
description = "Build all packages"
run = "pnpm build"

[tasks.lint]
description = "Lint all packages"
run = "pnpm lint"

[tasks.typecheck]
description = "Typecheck all packages"
run = "pnpm typecheck"

[tasks.test]
description = "Run tests across workspace"
run = "pnpm test"

[tasks.check]
description = "All checks (lint + typecheck + test)"
run = "pnpm check"
