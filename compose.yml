# Tsumugi local compose
#
# Production の compose は別途管理する想定。
# このファイルは開発・動作確認用。
#
# 起動:
#   docker compose up -d
#
# 構成:
#   - tsumugi-postgres : Postgres 18 + pgvector + pg_bigm 1.2-20250903 (internal only)
#   - tsumugi-server   : MCP server + REST API + dreaming worker (internal only)
#   - tsumugi-front    : nginx で React admin UI を配信、/api と /mcp は server に proxy
#
# アクセス:
#   - http://localhost:8000/         → admin UI
#   - http://localhost:8000/api/...  → REST API (nginx 経由)
#   - http://localhost:8000/mcp      → MCP transport (nginx 経由)
#
# auth は本リポでは扱わない。public 公開時は reverse proxy 側 (Traefik / Caddy /
# nginx-proxy 等) で TLS と認証を被せること。

services:
  tsumugi-postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: tsumugi-postgres
    environment:
      POSTGRES_DB: tsumugi
      POSTGRES_USER: tsumugi
      POSTGRES_PASSWORD: ${TSUMUGI_PG_PASSWORD:-tsumugi_dev}
    # PG18+ は major-version-specific subdir (/var/lib/postgresql/18) を使うため、
    # 親ディレクトリ /var/lib/postgresql 全体をマウントする (pg_upgrade --link 互換配置)
    volumes:
      - tsumugi-pg-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      # ローカル DB クライアントでの調査用、外部から接続不要なら削除可
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsumugi -d tsumugi"]
      interval: 10s
      timeout: 5s
      retries: 5

  tsumugi-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tsumugi-server
    environment:
      DATABASE_URL: postgresql://tsumugi:${TSUMUGI_PG_PASSWORD:-tsumugi_dev}@tsumugi-postgres:5432/tsumugi
      NODE_ENV: production
      HF_CACHE: /app/.cache/huggingface
      # LLM provider 設定 (1Password tsumugi-dev env から流入)
      LLM_LOW_PROVIDER: ${LLM_LOW_PROVIDER:-openai-compat}
      LLM_LOW_API_KEY: ${LLM_LOW_API_KEY:-}
      LLM_LOW_MODEL: ${LLM_LOW_MODEL:-glm-5.2}
      LLM_LOW_BASE_URL: ${LLM_LOW_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      LLM_LOW_OPENAI_DIALECT: ${LLM_LOW_OPENAI_DIALECT:-zai}
      LLM_LOW_THINKING: ${LLM_LOW_THINKING:-disabled}
      LLM_LOW_TIMEOUT_MS: ${LLM_LOW_TIMEOUT_MS:-30000}
      LLM_MID_PROVIDER: ${LLM_MID_PROVIDER:-openai-compat}
      LLM_MID_API_KEY: ${LLM_MID_API_KEY:-}
      LLM_MID_MODEL: ${LLM_MID_MODEL:-glm-5.2}
      LLM_MID_BASE_URL: ${LLM_MID_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      LLM_MID_OPENAI_DIALECT: ${LLM_MID_OPENAI_DIALECT:-zai}
      LLM_MID_THINKING: ${LLM_MID_THINKING:-enabled}
      LLM_MID_REASONING_EFFORT: ${LLM_MID_REASONING_EFFORT:-high}
      LLM_MID_TIMEOUT_MS: ${LLM_MID_TIMEOUT_MS:-90000}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-3}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
    volumes:
      - tsumugi-hf-cache:/app/.cache/huggingface
    expose:
      - "8000"
    depends_on:
      tsumugi-postgres:
        condition: service_healthy
    restart: unless-stopped

  tsumugi-front:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    container_name: tsumugi-front
    ports:
      - "8000:80"
    depends_on:
      - tsumugi-server
    restart: unless-stopped

volumes:
  tsumugi-pg-data:
  tsumugi-hf-cache:
