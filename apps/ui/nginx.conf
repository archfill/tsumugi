# tsumugi-front nginx config
#
# 役割:
#   - /            → React SPA を配信 (try_files → index.html)
#   - /assets/*    → Vite が吐く静的 chunk (CSS/JS) を配信
#   - /api/*       → tsumugi-server に proxy
#   - /mcp         → tsumugi-server に proxy (long-lived streaming)
#   - /health      → tsumugi-server の health に proxy

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 静的アセットは長めにキャッシュ可
    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # REST API → backend
    location /api/ {
        proxy_pass http://tsumugi-server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP transport — long-lived / streaming
    # (WebStandardStreamableHTTPServerTransport で chunked + SSE 風)
    location /mcp {
        proxy_pass http://tsumugi-server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /health {
        proxy_pass http://tsumugi-server:8000;
    }

    # Prometheus metrics — server で /metrics 配信
    location /metrics {
        proxy_pass http://tsumugi-server:8000;
    }

    # SPA fallback: ファイルが無ければ index.html を返す
    location / {
        try_files $uri $uri/ /index.html;
    }
}
