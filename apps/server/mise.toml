[tasks.dev]
description = "Run MCP server in dev mode (tsx watch)"
run = "pnpm dev"

[tasks.build]
description = "Build server"
run = "pnpm build"

[tasks.start]
description = "Run built server"
run = "pnpm start"

[tasks.typecheck]
description = "tsc -b --noEmit"
run = "pnpm typecheck"

[tasks.test]
description = "Run tests"
run = "pnpm test"

[tasks.check]
description = "All checks"
run = "pnpm check"

[tasks.db-generate]
description = "Generate Drizzle migration files"
run = "pnpm db:generate"

[tasks.db-migrate]
description = "Run pending Drizzle migrations"
run = "pnpm db:migrate"

[tasks.db-studio]
description = "Open Drizzle Studio"
run = "pnpm db:studio"
