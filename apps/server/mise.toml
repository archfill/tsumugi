[tasks.dev]
description = "Run MCP server in dev mode (tsx watch)"
run = "pnpm dev"

[tasks.build]
description = "Build server"
run = "pnpm build"

[tasks.start]
description = "Run built server"
run = "pnpm start"

[tasks.typecheck]
description = "tsc -b --noEmit"
run = "pnpm typecheck"

[tasks.test]
description = "Run tests"
run = "pnpm test"

[tasks.check]
description = "All checks"
run = "pnpm check"

[tasks.db-generate]
description = "Generate Drizzle migration files"
run = "pnpm db:generate"

[tasks.db-migrate]
description = "Run pending Drizzle migrations"
run = "pnpm db:migrate"

[tasks.db-studio]
description = "Open Drizzle Studio"
run = "pnpm db:studio"

[tasks.search-smoke]
description = "Run hybrid search smoke test"
run = "pnpm search:smoke"

[tasks.dev-http]
description = "Run MCP server in HTTP/SSE mode (dev)"
run = "pnpm dev:http"

[tasks.dev-stdio]
description = "Run MCP server in stdio mode (dev)"
run = "pnpm dev:stdio"

[tasks.start-http]
description = "Run built MCP server in HTTP/SSE mode"
run = "pnpm start:http"

[tasks.start-stdio]
description = "Run built MCP server in stdio mode"
run = "pnpm start:stdio"

[tasks.mcp-smoke]
description = "Run MCP tools smoke test (requires DB)"
run = "pnpm mcp:smoke"

[tasks.llm-smoke]
description = "Run LLM client smoke test (requires LLM_LOW_API_KEY)"
run = "pnpm llm:smoke"

[tasks.summarize-smoke]
description = "Run observation summarize smoke test (requires LLM_LOW_API_KEY)"
run = "pnpm summarize:smoke"

[tasks.audn-smoke]
description = "Run AUDN judge smoke test (requires DATABASE_URL + LLM_MID_API_KEY)"
run = "pnpm audn:smoke"

[tasks.synthesize-smoke]
description = "Run synthesize memories smoke test (requires DATABASE_URL + LLM_LOW_API_KEY)"
run = "pnpm synthesize:smoke"

[tasks.time-update-smoke]
description = "Run time-aware memory update smoke test (requires DATABASE_URL + LLM_LOW_API_KEY)"
run = "pnpm time-update:smoke"

[tasks.decision-contradiction-smoke]
description = "Run decision contradiction detector smoke test (requires DATABASE_URL + LLM_MID_API_KEY)"
run = "pnpm decision-contradiction:smoke"

[tasks.reflection-smoke]
description = "Run session reflection smoke test (requires DATABASE_URL + LLM_LOW_API_KEY)"
run = "pnpm reflection:smoke"

[tasks.dream-promote]
description = "Run promote-observations dreaming job"
run = "pnpm dream:promote"

[tasks.dream-synthesize]
description = "Run synthesize dreaming job"
run = "pnpm dream:synthesize"

[tasks.dream-time-update]
description = "Run time-update dreaming job"
run = "pnpm dream:time-update"

[tasks.dream-decision]
description = "Run decision-contradiction dreaming job"
run = "pnpm dream:decision"

[tasks.dream-full]
description = "Run full dreaming pipeline (promote → synthesize → time-update → decision-contradiction)"
run = "pnpm dream:full"

[tasks.dreaming-smoke]
description = "Run dreaming runner smoke test (requires DATABASE_URL + LLM_LOW_API_KEY + LLM_MID_API_KEY)"
run = "pnpm dreaming:smoke"

[tasks.bench]
description = "Run all evaluation benches (requires DATABASE_URL + LLM keys)"
run = "pnpm bench"

[tasks.bench-audn]
description = "Run AUDN decision bench"
run = "pnpm bench:audn"

[tasks.bench-audn-synthetic]
description = "Run AUDN decision bench with public synthetic fixtures only"
run = "pnpm bench:audn-synthetic"

[tasks.bench-audn-private-sample]
description = "Run AUDN bench with a fixed private sample"
run = "pnpm bench:audn-private-sample"

[tasks.bench-audn-batch]
description = "Run experimental batched AUDN decision bench"
run = "pnpm bench:audn-batch"

[tasks.bench-audn-batch-synthetic]
description = "Run batched AUDN bench with public synthetic fixtures only"
run = "pnpm bench:audn-batch-synthetic"

[tasks.bench-audn-batch-private-sample]
description = "Run batched AUDN bench with a fixed private sample"
run = "pnpm bench:audn-batch-private-sample"

[tasks.bench-audn-batch2-synthetic]
description = "Run size-2 AUDN batch bench with public synthetic fixtures only"
run = "pnpm bench:audn-batch2-synthetic"

[tasks.eval-seed]
description = "Extract yui DB data into eval/fixtures-private/ (requires YUI_DATABASE_URL)"
run = "pnpm eval:seed"

[tasks.bench-promote]
description = "Run promote-skip bench"
run = "pnpm bench:promote"

[tasks.bench-search]
description = "Run hybrid search bench (seeds + queries memories, requires DATABASE_URL)"
run = "pnpm bench:search"

[tasks.bench-contradiction]
description = "Run decision contradiction bench (requires LLM_MID_API_KEY)"
run = "pnpm bench:contradiction"

[tasks.bench-time-update]
description = "Run time-aware memory update bench (requires LLM_LOW_API_KEY)"
run = "pnpm bench:time-update"
